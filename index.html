<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VketReal 2025 Summer am pass card ジェネレーター</title>
    <script src="/VketReal_ImageCreator/tailwind.css"></script>
    <!-- Visualization & Content Choices:
        - Base Image: Loaded onto canvas as background. Goal: Provide template. Method: Canvas `drawImage()`. Source: User-provided URL (placeholder initially, now user-editable).
        - Name/SNS: Text input fields. Goal: User identification. Method: Canvas `fillText()`. Interaction: Real-time update on input.
        - User Image: File input. Goal: Personalization. Method: Canvas `drawImage()` after FileReader. Interaction: Display uploaded image in designated frame.
        - Date Selection: Checkboxes. Goal: Indicate attendance. Method: Canvas `arc()` for circles, `fillText()` for speech bubble. Interaction: Update circles and text on selection.
        - Download: Button. Goal: Export customized card. Method: `canvas.toDataURL()`.
        - Hashtag: Text display + Button. Goal: Promote event. Method: `navigator.clipboard.writeText()`.
        - CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .control-label {
            @apply block text-sm font-medium text-slate-700 mb-1;
        }
        .text-input {
            @apply mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500;
        }
        .btn {
            @apply px-4 py-2 rounded-md font-semibold text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2;
        }
        .btn-primary {
            @apply bg-pink-500 hover:bg-pink-600 text-white focus:ring-pink-500;
        }
        .btn-secondary {
            @apply bg-slate-200 hover:bg-slate-300 text-slate-700 focus:ring-slate-400;
        }
        /* Ensure canvas is responsive but has a max-width to prevent it from becoming too large on desktop */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 640px; /* Adjust as needed, half of 1280 for better display */
            margin-left: auto;
            margin-right: auto;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background-color: #f0f0f0;
            border-radius: 0.375rem; /* rounded-md */
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 py-8 px-4">

    <div class="container mx-auto max-w-5xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-pink-600">VketReal 2025 Summer</h1>
            <p class="text-xl text-slate-700">参加表明カードジェネレーター</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-xl mb-6">
            <p class="text-sm text-slate-600 mb-4">
                このツールを使って、VketReal 2025 Summerのオリジナル参加表明カードを作成しましょう！<br>
                名前、SNSアカウント、お気に入りの画像を設定し、参加する日にちを選んで、あなただけのカードを生成できます。<br>
                完成したカードはダウンロードしてSNSでシェアしましょう！
            </p>
        </div>

        <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-6" role="alert">
            <p class="font-bold">注意</p>
            <p>このツールは非公式のものであり、VketReal 2025 Summerの公式ツールではありません。</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-1/3 bg-white p-6 rounded-lg shadow-xl">
                <h2 class="text-xl font-semibold mb-4 text-pink-600">カスタマイズ情報</h2>
                <div class="space-y-4">
                    <div>
                        <label for="nameInput" class="control-label">名前:</label>
                        <input type="text" id="nameInput" class="text-input" placeholder="Vketちゃん">
                    </div>
                    <div>
                        <label for="snsInput" class="control-label">SNSアカウント:</label>
                        <input type="text" id="snsInput" class="text-input" placeholder="@VketReal">
                    </div>
                    <div>
                        <label for="imageUpload" class="control-label">プロフィール画像:</label>
                        <input type="file" id="imageUpload" accept="image/*"
                            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                    </div>
                    <div>
                        <span class="control-label">参加日程:</span>
                        <div class="mt-2 space-y-2">
                            <label class="flex items-center">
                                <input type="checkbox" id="date26"
                                    class="h-4 w-4 text-pink-600 border-slate-300 rounded focus:ring-pink-500">
                                <span class="ml-2 text-sm text-slate-700">7月26日 (SAT)</span>
                            </label>
                            <label class="flex items-center">
                                <input type="checkbox" id="date27"
                                    class="h-4 w-4 text-pink-600 border-slate-300 rounded focus:ring-pink-500">
                                <span class="ml-2 text-sm text-slate-700">7月27日 (SUN)</span>
                            </label>
                        </div>
                    </div>
                    <div class="pt-4 space-y-2">
                        <button id="downloadButton" class="btn btn-primary w-full">画像を生成・ダウンロード</button>
                        <a id="tweetLink" href="https://twitter.com/intent/tweet" target="_blank"
                            rel="noopener noreferrer" class="block">
                            <button class="btn btn-secondary w-full" type="button">
                                <img src="https://abs.twimg.com/icons/apple-touch-icon-192x192.png" alt="Twitter Icon"
                                    class="inline-block w-4 h-4 mr-2">
                                ツイートする
                            </button>
                        </a>
                    </div>
                </div>
            </div>

            <div class="lg:w-2/3">
                <h2 class="text-xl font-semibold mb-4 text-pink-600 text-center lg:text-left">プレビュー</h2>
                <div class="canvas-container bg-white p-2 rounded-lg shadow-xl">
                    <canvas id="passCardCanvas"></canvas>
                </div>
                <p class="text-xs text-slate-500 mt-2 text-center">ここにカスタマイズされたカードが表示されます。</p>
            </div>
        </div>
    </div>

    <script src="/VketReal_ImageCreator/script.js">

    </script>
</body>

</html>
